[build]
  command = "npm run build:netlify"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["exceljs"]

[[redirects]]
  from = "/submit"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/submissions"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
